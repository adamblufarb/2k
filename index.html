<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2K Draft</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d0d14; --card: #16161f; --card2: #1e1e2a;
      --accent: #3ec6ff; --accent2: #0070ff;
      --text: #f0f0f0; --subtext: #666; --border: #252530;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ─── Setup ─── */
    .setup-wrap { max-width: 440px; margin: 0 auto; padding: 48px 20px; text-align: center; }
    .app-title { font-size: 3.2rem; font-weight: 900; letter-spacing: -3px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .app-sub { color: var(--subtext); font-size: 0.85rem; margin-bottom: 44px; }
    .sec-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .players-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 36px; }
    .player-toggle { padding: 14px 8px; background: var(--card); border: 2px solid var(--border); border-radius: 14px; color: var(--subtext); font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: inherit; touch-action: manipulation; }
    .player-toggle.on { border-color: var(--accent); color: var(--accent); background: linear-gradient(135deg, rgba(62,198,255,0.14), rgba(0,112,255,0.08)); }
    .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 800; font-size: 1rem; border: none; border-radius: 14px; cursor: pointer; font-family: inherit; transition: opacity 0.15s, transform 0.1s; touch-action: manipulation; }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary:not(:disabled):active { transform: scale(0.98); }

    /* ─── Reveal / Matchup shared ─── */
    .reveal-wrap { max-width: 440px; margin: 0 auto; padding: 40px 20px; text-align: center; }
    .reveal-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .reveal-sub { color: var(--subtext); font-size: 0.85rem; margin-bottom: 28px; min-height: 20px; }
    .hat-btn { background: none; border: none; cursor: pointer; font-size: 100px; line-height: 1; display: block; margin: 48px auto 40px; transform: scaleY(-1); transition: transform 0.1s; touch-action: manipulation; user-select: none; }
    .hat-btn:active { transform: scaleY(-1) scale(0.93); }
    .hat-btn.shake { animation: hatShake 0.55s ease-in-out; }
    .wrestling-btn { background: none; border: none; cursor: pointer; font-size: 100px; line-height: 1; display: block; margin: 40px auto 36px; transition: transform 0.1s; touch-action: manipulation; user-select: none; }
    .wrestling-btn:active { transform: scale(0.93); }
    .wrestling-btn.shake { animation: hatShake 0.55s ease-in-out; }
    @keyframes hatShake {
      0%,100% { transform: scaleY(-1) rotate(0deg); }
      15%  { transform: scaleY(-1) rotate(-12deg); }
      35%  { transform: scaleY(-1) rotate(12deg); }
      55%  { transform: scaleY(-1) rotate(-7deg); }
      75%  { transform: scaleY(-1) rotate(7deg); }
      90%  { transform: scaleY(-1) rotate(-3deg); }
    }
    @keyframes wresShake {
      0%,100% { transform: rotate(0deg) scale(1); }
      20% { transform: rotate(-8deg) scale(1.05); }
      40% { transform: rotate(8deg) scale(1.05); }
      60% { transform: rotate(-5deg) scale(1.02); }
      80% { transform: rotate(5deg) scale(1.02); }
    }
    .wrestling-btn.shake { animation: wresShake 0.55s ease-in-out; }
    .order-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin: 0 auto 28px; }
    .order-item { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: 12px; padding: 13px 16px; opacity: 0; transform: translateY(20px) scale(0.88); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .order-item.show { opacity: 1; transform: none; }
    .order-num { width: 30px; height: 30px; border-radius: 50%; color: #000; font-weight: 800; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .order-name { font-weight: 700; font-size: 1rem; }
    .order-badge { margin-left: auto; font-size: 0.7rem; color: var(--subtext); }
    .btn-go { display: none; max-width: 300px; margin: 0 auto; }

    /* ─── Matchup display ─── */
    .matchup-sides { display: flex; align-items: flex-start; gap: 10px; max-width: 360px; margin: 0 auto 20px; }
    .matchup-side { flex: 1; }
    .side-lbl { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .matchup-vs { align-self: center; margin-top: 24px; font-size: 1.1rem; font-weight: 900; color: var(--subtext); flex-shrink: 0; }
    .matchup-item { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; opacity: 0; transform: translateY(16px) scale(0.9); transition: all 0.38s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .matchup-item.show { opacity: 1; transform: none; }
    .matchup-item.empty { opacity: 0.3; transform: none; transition: none; }
    .mi-name { font-weight: 700; font-size: 0.9rem; }
    .mi-role { font-size: 0.65rem; color: var(--subtext); margin-top: 1px; }
    .bye-row { text-align: center; margin-top: 12px; font-size: 0.82rem; color: var(--subtext); background: var(--card); border-radius: 10px; padding: 10px 14px; max-width: 360px; margin-left: auto; margin-right: auto; }

    /* ─── Draft ─── */
    .draft-wrap { max-width: 960px; margin: 0 auto; padding: 14px; }
    .btn-back-full { display: block; width: 100%; padding: 13px; background: var(--card2); border: 1.5px solid var(--border); border-radius: 12px; color: var(--subtext); font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; touch-action: manipulation; transition: color 0.15s, border-color 0.15s; margin-bottom: 14px; }
    @media (hover: hover) { .btn-back-full:hover { color: var(--text); border-color: var(--subtext); } }
    .btn-back-full:disabled { opacity: 0.3; cursor: not-allowed; }
    @keyframes rewindAnim {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-14px); }
      45%  { transform: translateX(-7px); }
      65%  { transform: translateX(-11px); }
      82%  { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }
    .btn-back-full.rewinding { animation: rewindAnim 0.38s ease-out; color: var(--accent); border-color: var(--accent); }

    .draft-body { display: grid; grid-template-columns: 1fr 260px; gap: 14px; align-items: start; }
    @media (max-width: 680px) { .draft-body { grid-template-columns: 1fr; } #teams-panel { order: -1; } }

    /* Teams panel */
    .team-card { background: var(--card); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; border: 2px solid transparent; transition: border-color 0.2s; }
    .team-card.cur { border-color: var(--tc); background: linear-gradient(160deg, var(--card), color-mix(in srgb, var(--tc) 8%, var(--card))); }
    .tc-head { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
    .tc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tc-name { font-size: 0.82rem; font-weight: 700; }
    .tc-order { margin-left: auto; font-size: 0.62rem; color: var(--subtext); }

    .roster-slot { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: 7px; margin-bottom: 3px; min-height: 30px; }
    .roster-slot.filled { cursor: grab; }
    .roster-slot.filled:active { cursor: grabbing; }
    .roster-slot.drag-over { background: rgba(62,198,255,0.15); outline: 1.5px dashed var(--accent); }
    .slot-pos { font-size: 0.6rem; font-weight: 700; color: var(--subtext); width: 32px; flex-shrink: 0; text-align: center; background: var(--card2); border-radius: 4px; padding: 2px 0; }
    .slot-content { flex: 1; display: flex; align-items: center; justify-content: space-between; min-width: 0; }
    .slot-pname { font-size: 0.75rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slot-povr { font-size: 0.7rem; font-weight: 700; color: var(--accent); flex-shrink: 0; margin-left: 4px; }
    .slot-empty { font-size: 0.7rem; color: var(--subtext); font-style: italic; }
    .drag-handle { font-size: 0.7rem; color: var(--subtext); cursor: grab; flex-shrink: 0; padding: 0 2px; touch-action: none; }

    /* Players list */
    .section-lbl { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .player-card { display: flex; align-items: center; gap: 11px; background: var(--card); border-radius: 10px; padding: 10px 13px; margin-bottom: 7px; cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.12s, background 0.12s; touch-action: manipulation; user-select: none; outline: none; -webkit-touch-callout: none; }
    @media (hover: hover) { .player-card:hover { border-color: var(--accent); background: var(--card2); } }
    .player-card:active { opacity: 0.7; }
    .p-rank { width: 24px; font-size: 0.65rem; color: var(--subtext); font-weight: 600; text-align: center; flex-shrink: 0; }
    .p-info { flex: 1; min-width: 0; }
    .p-name { font-size: 0.87rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-team { font-size: 0.68rem; color: var(--subtext); }
    .p-pos { font-size: 0.62rem; font-weight: 700; color: var(--subtext); background: var(--card2); border-radius: 4px; padding: 1px 5px; flex-shrink: 0; }
    .p-ovr { font-size: 0.98rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; flex-shrink: 0; }
    .show-more { width: 100%; padding: 11px; background: var(--card); border: 1.5px dashed var(--border); border-radius: 10px; color: var(--subtext); font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; touch-action: manipulation; margin-bottom: 10px; }
    @media (hover: hover) { .show-more:hover { border-color: var(--accent); color: var(--accent); } }
    .btn-end { width: 100%; padding: 13px; background: transparent; border: 1.5px solid var(--border); border-radius: 10px; color: var(--subtext); font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; touch-action: manipulation; }
    @media (hover: hover) { .btn-end:hover { border-color: #ff453a; color: #ff453a; } }

    /* Drag ghost */
    .drag-ghost { position: fixed; pointer-events: none; z-index: 999; background: var(--accent); color: #fff; padding: 5px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 700; transform: translate(-50%, -50%); white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }

    /* ─── Rating Modal ─── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
    .modal-card { background: var(--card); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
    .modal-title { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
    .modal-sub { font-size: 0.75rem; color: var(--subtext); margin-bottom: 24px; }
    .rating-stepper { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 28px; }
    .step-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card2); border: 1.5px solid var(--border); color: var(--text); font-size: 1.4rem; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: all 0.12s; touch-action: manipulation; }
    @media (hover: hover) { .step-btn:hover { border-color: var(--accent); color: var(--accent); } }
    .step-btn:active { transform: scale(0.9); }
    .rating-val { font-size: 3rem; font-weight: 900; color: var(--accent); min-width: 80px; }
    .modal-actions { display: flex; gap: 10px; }
    .btn-modal-save { flex: 2; padding: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 800; font-size: 0.95rem; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; touch-action: manipulation; }
    .btn-modal-cancel { flex: 1; padding: 13px; background: transparent; border: 1.5px solid var(--border); border-radius: 12px; color: var(--subtext); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; touch-action: manipulation; }
    .modal-hint { font-size: 0.65rem; color: var(--subtext); margin-top: 12px; }
    .btn-modal-reset { background: none; border: none; color: #ff453a; font-size: 0.72rem; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 10px; padding: 4px; touch-action: manipulation; display: none; }
    .sum-avg { font-size: 0.7rem; font-weight: 700; background: linear-gradient(135deg, rgba(62,198,255,0.2), rgba(0,112,255,0.15)); color: var(--accent); border-radius: 6px; padding: 3px 8px; margin-left: auto; border: 1px solid rgba(62,198,255,0.2); }

    /* ─── Summary ─── */
    .summary-wrap { max-width: 680px; margin: 0 auto; padding: 24px 14px; }
    .summary-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; text-align: center; }
    .summary-sub { color: var(--subtext); font-size: 0.82rem; text-align: center; margin-bottom: 20px; }
    .matchup-card { background: var(--card); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; border-top: 3px solid var(--accent); }
    .matchup-card-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .matchup-card-body { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .matchup-team-chip { display: flex; align-items: center; gap: 6px; background: var(--card2); border-radius: 8px; padding: 6px 10px; }
    .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .chip-name { font-size: 0.82rem; font-weight: 700; }
    .chip-role { font-size: 0.62rem; color: var(--subtext); margin-top: 1px; }
    .matchup-vs-badge { font-size: 0.78rem; font-weight: 900; color: var(--subtext); }
    .sum-team { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; border-top: 3px solid var(--tc); }
    .sum-team-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .sum-order-badge { font-size: 0.62rem; font-weight: 700; background: var(--card2); border-radius: 20px; padding: 2px 8px; color: var(--subtext); margin-left: auto; }
    .sum-slot { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .sum-slot:last-child { border-bottom: none; }
    .sum-slot-pos { font-size: 0.6rem; font-weight: 700; color: var(--subtext); background: var(--card2); border-radius: 4px; padding: 2px 5px; width: 36px; text-align: center; flex-shrink: 0; }
    .sum-slot-name { flex: 1; font-weight: 600; }
    .sum-slot-ovr { font-size: 0.75rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .sum-slot-empty { color: var(--subtext); font-style: italic; }
    .summary-actions { display: flex; flex-direction: column; gap: 10px; max-width: 440px; margin: 0 auto; }
    .btn-redraft { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 800; font-size: 1rem; border: none; border-radius: 14px; cursor: pointer; font-family: inherit; touch-action: manipulation; }
    .btn-startover { width: 100%; padding: 13px; background: transparent; border: 1.5px solid var(--border); border-radius: 14px; color: var(--subtext); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; touch-action: manipulation; transition: all 0.15s; }
    @media (hover: hover) { .btn-startover:hover { border-color: var(--subtext); color: var(--text); } }
  </style>
</head>
<body>

<!-- Setup -->
<div class="screen active" id="screen-setup">
  <div class="setup-wrap">
    <div class="app-title">2K DRAFT</div>
    <div class="app-sub">NBA 2K26 · Snake Draft</div>
    <div class="sec-label">Who's playing?</div>
    <div class="players-grid" id="players-grid"></div>
    <button class="btn-primary" id="btn-start" disabled>Continue →</button>
  </div>
</div>

<!-- Reveal -->
<div class="screen" id="screen-reveal">
  <div class="reveal-wrap">
    <div class="reveal-title">Draft Order</div>
    <div class="reveal-sub" id="reveal-sub">Tap the hat to draw a name</div>
    <button class="hat-btn" id="hat" onclick="drawNext()">🎩</button>
    <div class="order-list" id="order-list"></div>
    <button class="btn-primary btn-go" id="btn-go">Start Drafting →</button>
  </div>
</div>

<!-- Draft -->
<div class="screen" id="screen-draft">
  <div class="draft-wrap">
    <div class="draft-body">
      <div id="players-panel">
        <button class="btn-back-full" id="btn-back" onclick="undoPick()" disabled>← Undo</button>
        <div class="section-lbl">Available Players</div>
        <div id="players-list"></div>
        <button class="show-more" id="show-more">Show 20 More ↓</button>
        <button class="btn-end" onclick="endDraft()">End Draft</button>
      </div>
      <div id="teams-panel"></div>
    </div>
  </div>
</div>

<!-- Matchup -->
<div class="screen" id="screen-matchup">
  <div class="reveal-wrap">
    <div class="reveal-title">Match Up</div>
    <div class="reveal-sub" id="matchup-sub">Tap to reveal match up</div>
    <button class="wrestling-btn" id="wrestling" onclick="drawMatchup()">🤼</button>
    <div id="matchup-display"></div>
    <button class="btn-primary btn-go" id="btn-matchup-go" onclick="showSummary()">View Draft Summary →</button>
  </div>
</div>

<!-- Summary -->
<div class="screen" id="screen-summary">
  <div class="summary-wrap">
    <div class="summary-title">🏆 Draft Complete</div>
    <div class="summary-sub" id="summary-sub"></div>
    <div id="summary-matchup"></div>
    <div id="summary-teams"></div>
    <div class="summary-actions">
      <button class="btn-redraft" onclick="redraft()">Re-draft (Same Order)</button>
      <button class="btn-startover" onclick="startOver()">Start Over</button>
    </div>
  </div>
</div>

<!-- Rating edit modal -->
<div class="modal-overlay" id="rating-modal" style="display:none">
  <div class="modal-card">
    <div class="modal-title" id="modal-player-name"></div>
    <div class="modal-sub">Adjust OVR Rating</div>
    <div class="rating-stepper">
      <button class="step-btn" onclick="adjustRating(-1)">−</button>
      <div class="rating-val" id="modal-rating">99</div>
      <button class="step-btn" onclick="adjustRating(1)">+</button>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-save" onclick="saveRating()">Save</button>
      <button class="btn-modal-cancel" onclick="closeRatingModal()">Cancel</button>
    </div>
    <button class="btn-modal-reset" id="btn-modal-reset" onclick="resetRating()">Reset to default</button>
    <div class="modal-hint">Hold any player to adjust rating</div>
  </div>
</div>

<script>
  const NAMES  = ['Brown','Dor','Yuval','Adam','Uri','Guest'];
  const COLORS = ['#f7a600','#34c759','#0a84ff','#ff453a','#bf5af2','#30d158'];

  const SLOTS  = ['PG','SG','SF','PF','C','B1','B2'];
  const SLOT_LBL = {PG:'PG',SG:'SG',SF:'SF',PF:'PF',C:'C',B1:'Bench',B2:'Bench'};
  const MAX_PER_TEAM = 7;

  const PLAYERS = [

    {rank:3,  name:"Giannis Antetokounmpo",    team:"Milwaukee Bucks",        ovr:97, pos:'PF'},

    {rank:5,  name:"Anthony Edwards",          team:"Minnesota Timberwolves", ovr:95, pos:'SG'},
    {rank:6,  name:"Stephen Curry",            team:"Golden State Warriors",  ovr:94, pos:'PG'},
    {rank:7,  name:"LeBron James",             team:"Los Angeles Lakers",     ovr:94, pos:'SF'},
    {rank:8,  name:"Jayson Tatum",             team:"Boston Celtics",         ovr:94, pos:'SF'},
    {rank:9,  name:"Victor Wembanyama",        team:"San Antonio Spurs",      ovr:94, pos:'C'},
    {rank:10, name:"Kevin Durant",             team:"Houston Rockets",        ovr:93, pos:'SF'},
    {rank:11, name:"Donovan Mitchell",         team:"Cleveland Cavaliers",    ovr:93, pos:'SG'},
    {rank:12, name:"Anthony Davis",            team:"Dallas Mavericks",       ovr:93, pos:'PF'},
    {rank:13, name:"Jalen Brunson",            team:"New York Knicks",        ovr:93, pos:'PG'},
    {rank:14, name:"Tyrese Haliburton",        team:"Indiana Pacers",         ovr:93, pos:'PG'},
    {rank:15, name:"Kawhi Leonard",            team:"Los Angeles Clippers",   ovr:92, pos:'SF'},
    {rank:16, name:"Cade Cunningham",          team:"Detroit Pistons",        ovr:92, pos:'PG'},
    {rank:17, name:"Joel Embiid",              team:"Philadelphia 76ers",     ovr:92, pos:'C'},
    {rank:18, name:"Karl-Anthony Towns",       team:"New York Knicks",        ovr:92, pos:'C'},
    {rank:19, name:"Ja Morant",                team:"Memphis Grizzlies",      ovr:91, pos:'PG'},

  // ── Custom Ratings (localStorage) ──

  // ── State ──
  let selected    = new Set();
  let teams       = [];
  let draftOrder  = [];
  let remaining   = [];
  let drawIndex   = 0;
  let currentPick = 0;
  let available   = [];
  let history     = [];

  // Matchup state
  let matchupSlots  = [];

  // Rating modal state
  let editingRank = null;
  let editingOvr  = null;

  function emptyRoster() { return {PG:null,SG:null,SF:null,PF:null,C:null,B1:null,B2:null}; }

  function pickCount(tIdx) {
    return Object.values(teams[tIdx].roster).filter(v => v !== null).length;
  }

  function autoSlot(tIdx, rank) {
    const pos = PLAYERS.find(p => p.rank === rank).pos;
    const r   = teams[tIdx].roster;
    if (r[pos] === null)  return pos;
    if (r['B1'] === null) return 'B1';
    if (r['B2'] === null) return 'B2';
    return null;
  }

  function teamForPick(pickIdx) {
    const n     = teams.length;
    const round = Math.floor(pickIdx / n);
    const pos   = pickIdx % n;
    return draftOrder[round % 2 === 0 ? pos : n - 1 - pos];
  }

  function getMatchupSlots(n) {
    if (n <= 2) return null;
    if (n === 3) return [
      {side:'A', role:'Primary'},
      {side:'B', role:'Primary'},
      {side:'B', role:'Secondary'}
    ];
    if (n === 4) return [
      {side:'A', role:'Primary'},
      {side:'A', role:'Secondary'},
      {side:'B', role:'Primary'},
      {side:'B', role:'Secondary'}
    ];
    if (n === 5) return [
      {side:'A', role:'Primary'},
      {side:'A', role:'Secondary'},
      {side:'B', role:'Primary'},
      {side:'B', role:'Secondary'},
      {side:'bye', role:'Sits Out'}
    ];
    // 6 teams: 3v3
    return [
      {side:'A', role:'Primary'},
      {side:'A', role:'Secondary'},
      {side:'A', role:'Third'},
      {side:'B', role:'Primary'},
      {side:'B', role:'Secondary'},
      {side:'B', role:'Third'}
    ];
  }

  // ── Setup ──
  const grid = document.getElementById('players-grid');
  NAMES.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'player-toggle';
    btn.textContent = name;
    btn.addEventListener('click', () => {
      selected.has(i) ? selected.delete(i) : selected.add(i);
      btn.classList.toggle('on', selected.has(i));
      document.getElementById('btn-start').disabled = selected.size < 2;
    });
    grid.appendChild(btn);
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    const sel = [...selected].sort((a,b) => a - b);
    teams     = sel.map(i => ({ name: NAMES[i], color: COLORS[i], roster: emptyRoster() }));
    remaining = Array.from({length: teams.length}, (_, i) => i);
    for (let i = remaining.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }
    draftOrder  = [];
    drawIndex   = 0;
    available   = PLAYERS.map(p => p.rank);
    currentPick = 0;
    history     = [];
    showCount   = 20;

    document.getElementById('order-list').innerHTML = '';
    document.getElementById('btn-go').style.display = 'none';
    document.getElementById('reveal-sub').textContent = 'Tap the hat to draw a name';
    showScreen('screen-reveal');

  // ── Reveal ──
  let hatBusy = false;

  window.drawNext = function() {
    if (hatBusy || remaining.length === 0) return;
    hatBusy = true;
    const hat = document.getElementById('hat');
    hat.classList.add('shake');
    setTimeout(() => hat.classList.remove('shake'), 560);

    setTimeout(() => {
      const idx  = Math.floor(Math.random() * remaining.length);
      const tIdx = remaining.splice(idx, 1)[0];
      draftOrder.push(tIdx);

      const t = teams[tIdx];
      const item = document.createElement('div');
      item.className = 'order-item';
      item.innerHTML = `
        <div class="order-num" style="background:${t.color}">${drawIndex + 1}</div>
        <div class="order-name">${t.name}</div>
        <div class="order-badge">Picks ${SFXS[drawIndex]}</div>`;
      document.getElementById('order-list').appendChild(item);
      requestAnimationFrame(() => requestAnimationFrame(() => item.classList.add('show')));
      drawIndex++;
      hatBusy = false;

      const left = remaining.length;
      document.getElementById('reveal-sub').textContent =
        left === 0 ? 'Order set!' : `${left} name${left > 1 ? 's' : ''} left`;
      if (left === 0) document.getElementById('btn-go').style.display = 'block';
    }, 300);
  };

  document.getElementById('btn-go').addEventListener('click', () => {
    showScreen('screen-draft');
    renderDraft();

  // ── Matchup ──
  window.drawMatchup = function() {
    if (matchupBusy || matchupPool.length === 0) return;
    matchupBusy = true;
    const wres = document.getElementById('wrestling');
    wres.classList.add('shake');
    setTimeout(() => wres.classList.remove('shake'), 560);

    setTimeout(() => {
      const nextSlot = matchupSlots[matchupDrawn.length];
      const idx  = Math.floor(Math.random() * matchupPool.length);
      const tIdx = matchupPool.splice(idx, 1)[0];
      matchupDrawn.push({tIdx, side: nextSlot.side, role: nextSlot.role});
      matchupBusy = false;
      renderMatchupScreen();
    }, 300);
  };

  function renderMatchupScreen() {
    const slotsA   = matchupSlots.filter(s => s.side === 'A');
    const slotsB   = matchupSlots.filter(s => s.side === 'B');
    const hasBye   = matchupSlots.some(s => s.side === 'bye');
    const drawnA   = matchupDrawn.filter(m => m.side === 'A');
    const drawnB   = matchupDrawn.filter(m => m.side === 'B');
    const drawnBye = matchupDrawn.find(m => m.side === 'bye');

    function slotHTML(slot, drawn, idx) {
      if (drawn) {
        const t = teams[drawn.tIdx];
        return `<div class="matchup-item show" style="transition-delay:${idx * 0.05}s">
          <div class="order-num" style="background:${t.color};font-size:0.75rem">${t.name[0]}</div>
          <div><div class="mi-name">${t.name}</div><div class="mi-role">${slot.role}</div></div>
        </div>`;
      }
      return `<div class="matchup-item empty">
        <div class="order-num" style="background:var(--card2);color:var(--subtext)">?</div>
        <div><div class="mi-name" style="color:var(--subtext)">${slot.role}</div></div>
      </div>`;
    }

    let html = '<div class="matchup-sides">';
    // Side A
    html += `<div class="matchup-side">
      <div class="side-lbl" style="color:#0a84ff">Side A</div>
      ${slotsA.map((s, i) => slotHTML(s, drawnA[i], i)).join('')}
    </div>`;
    // VS
    html += `<div class="matchup-vs">VS</div>`;
    // Side B
    html += `<div class="matchup-side">
      <div class="side-lbl" style="color:#ff453a">Side B</div>
      ${slotsB.map((s, i) => slotHTML(s, drawnB[i], i)).join('')}
    </div>`;
    html += '</div>';

    // Bye row
    if (hasBye) {
      if (drawnBye) {
        const t = teams[drawnBye.tIdx];
        html += `<div class="bye-row">Sits Out: <span style="color:${t.color};font-weight:700">${t.name}</span></div>`;
      } else {
        html += `<div class="bye-row">Sits Out: <em>TBD</em></div>`;
      }
    }

    document.getElementById('matchup-display').innerHTML = html;

    const remaining = matchupPool.length;
    const btnGo = document.getElementById('btn-matchup-go');
    if (remaining === 0) {
      document.getElementById('matchup-sub').textContent = 'Match up set!';
      btnGo.style.display = 'block';
    } else {
      document.getElementById('matchup-sub').textContent =
        matchupDrawn.length === 0 ? 'Tap to reveal match up' : `${remaining} team${remaining > 1 ? 's' : ''} left`;
      btnGo.style.display = 'none';
    }
  }

  // ── Drag/drop state ──
  let drag = null;

  function startDrag(e, tIdx, slot) {
    const rank = teams[tIdx].roster[slot];
    if (rank === null) return;
    e.preventDefault();

    const p     = PLAYERS.find(pl => pl.rank === rank);
    const ghost = document.createElement('div');
    ghost.className   = 'drag-ghost';
    ghost.textContent = p.name;
    ghost.style.left  = e.clientX + 'px';
    ghost.style.top   = e.clientY + 'px';
    document.body.appendChild(ghost);

    drag = { tIdx, slot, rank, ghost };

    const srcEl = document.querySelector(`[data-tidx="${tIdx}"][data-slot="${slot}"]`);
    if (srcEl) srcEl.style.opacity = '0.3';

    document.addEventListener('pointermove', onDragMove, {passive: false});
    document.addEventListener('pointerup',   onDragEnd);
  }

  function onDragMove(e) {
    if (!drag) return;
    e.preventDefault();
    drag.ghost.style.left = e.clientX + 'px';
    drag.ghost.style.top  = e.clientY + 'px';
    document.querySelectorAll('.roster-slot').forEach(el => el.classList.remove('drag-over'));
    const el = document.elementFromPoint(e.clientX, e.clientY)?.closest('[data-slot]');
    if (el) el.classList.add('drag-over');
  }

  function onDragEnd(e) {
    if (!drag) return;
    document.querySelectorAll('.roster-slot').forEach(el => el.classList.remove('drag-over'));

    const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('[data-slot]');
    if (target) {
      const dstTIdx = +target.dataset.tidx;
      const dstSlot = target.dataset.slot;
      if (!(dstTIdx === drag.tIdx && dstSlot === drag.slot)) {
        const dstRank = teams[dstTIdx].roster[dstSlot];
        teams[dstTIdx].roster[dstSlot]  = drag.rank;
        teams[drag.tIdx].roster[drag.slot] = dstRank;
        renderTeamsPanel();
      }
    }

    const srcEl = document.querySelector(`[data-tidx="${drag.tIdx}"][data-slot="${drag.slot}"]`);
    if (srcEl) srcEl.style.opacity = '';

    drag.ghost.remove();
    drag = null;
    document.removeEventListener('pointermove', onDragMove);
    document.removeEventListener('pointerup',   onDragEnd);
  }

  // ── Draft ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function renderDraft() {
    renderTeamsPanel();
    renderPlayers();
    document.getElementById('btn-back').disabled = currentPick === 0;
  }

  function renderTeamsPanel() {
    const curTeam = teamForPick(currentPick);
    const panel   = document.getElementById('teams-panel');

    panel.innerHTML = draftOrder.map((tIdx, orderPos) => {
      const t    = teams[tIdx];
      const isCur = tIdx === curTeam;
      const slots = SLOTS.map(slot => {
        const rank = t.roster[slot];
        const p    = rank !== null ? PLAYERS.find(pl => pl.rank === rank) : null;
        const filled = p !== null;
        return `<div class="roster-slot ${filled ? 'filled' : ''}"
                     data-tidx="${tIdx}" data-slot="${slot}"
                     ${filled ? `style="touch-action:none"` : ''}>
          <span class="slot-pos">${SLOT_LBL[slot]}</span>
          <span class="slot-content">
            ${filled
              ? `<span class="slot-pname">${p.name}</span><span class="slot-povr">${p.ovr}</span>`
              : `<span class="slot-empty">—</span>`
            }
          </span>
        </div>`;
      }).join('');

      return `<div class="team-card ${isCur ? 'cur' : ''}" style="--tc:${t.color}">
        <div class="tc-head">
          <div class="tc-dot" style="background:${t.color}"></div>
          <div class="tc-name">${t.name}</div>
          <div class="tc-order">${SFXS[orderPos]} pick</div>
        </div>
        ${slots}
      </div>`;
    }).join('');

    panel.querySelectorAll('.roster-slot.filled').forEach(el => {
      el.addEventListener('pointerdown', (e) => {
        startDrag(e, +el.dataset.tidx, el.dataset.slot);
      });
    });
  }

  function renderPlayers() {
    const avail   = PLAYERS.filter(p => available.includes(p.rank))
                           .sort((a, b) => b.ovr - a.ovr || a.rank - b.rank);
    const visible = avail.slice(0, showCount);
    const list    = document.getElementById('players-list');
    list.style.pointerEvents = '';

    list.innerHTML = visible.map(p => `
      <div class="player-card" data-rank="${p.rank}" tabindex="-1">
        <div class="p-rank">#${p.rank}</div>
        <div class="p-info">
          <div class="p-name">${p.name}</div>
          <div class="p-team">${p.team}</div>
        </div>
        <div class="p-pos">${p.pos}</div>
        <div class="p-ovr">${p.ovr}</div>
      </div>`).join('');

    list.querySelectorAll('.player-card').forEach(card => {
      const rank = +card.dataset.rank;
      attachCardHandlers(card, rank);
    });

    const btn = document.getElementById('show-more');
    const rem = avail.length - showCount;
    btn.style.display = rem > 0 ? 'block' : 'none';
    if (rem > 0) btn.textContent = `Show ${Math.min(20, rem)} More ↓`;
  }

  function attachCardHandlers(card, rank) {
    let longPressTimer = null;
    let startX, startY;
    let didLongPress = false;

    card.addEventListener('pointerdown', (e) => {
      didLongPress = false;
      startX = e.clientX; startY = e.clientY;
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        didLongPress = true;
        openRatingModal(rank);
      }, 600);
    });

    card.addEventListener('pointermove', (e) => {
      if (longPressTimer && (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10)) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    });

    ['pointerup', 'pointercancel'].forEach(ev => {
      card.addEventListener(ev, () => {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      });
    });

    card.addEventListener('contextmenu', e => e.preventDefault());

    card.addEventListener('click', () => {
      if (didLongPress) { didLongPress = false; return; }
      pickPlayer(rank);
    });
  }

  function pickPlayer(rank) {
    const tIdx = teamForPick(currentPick);
    const slot = autoSlot(tIdx, rank);
    if (slot === null) return;

    teams[tIdx].roster[slot] = rank;
    available = available.filter(r => r !== rank);
    history.push({tIdx, slot, rank});
    currentPick++;

    const list = document.getElementById('players-list');
    list.style.pointerEvents = 'none';
    renderDraft();
    setTimeout(() => { list.style.pointerEvents = ''; }, 500);

    const allFull = teams.every((_, i) => pickCount(i) >= MAX_PER_TEAM);
    if (allFull) setTimeout(() => endDraft(), 400);
  }

  window.undoPick = function() {
    if (currentPick === 0) return;
    const btn = document.getElementById('btn-back');
    btn.classList.remove('rewinding');
    void btn.offsetWidth;
    btn.classList.add('rewinding');
    setTimeout(() => btn.classList.remove('rewinding'), 400);

    const last = history.pop();
    teams[last.tIdx].roster[last.slot] = null;
    available.push(last.rank);
    available.sort((a,b) => a - b);
    currentPick--;
    const pos = PLAYERS.findIndex(p => p.rank === last.rank);
    if (pos >= showCount) showCount = pos + 1;
    renderDraft();
  };

  document.getElementById('show-more').addEventListener('click', () => {
    showCount += 20;
    renderPlayers();
  });

  window.endDraft = function() {
    const slots = getMatchupSlots(teams.length);
    if (!slots) {
      showSummary();
      return;
    }
    matchupSlots  = slots;
    matchupPool   = [...draftOrder]; // copy all team indices
    // Shuffle
    for (let i = matchupPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [matchupPool[i], matchupPool[j]] = [matchupPool[j], matchupPool[i]];
    }
    matchupDrawn  = [];
    matchupBusy   = false;

    document.getElementById('btn-matchup-go').style.display = 'none';
    document.getElementById('matchup-sub').textContent = 'Tap to reveal match up';
    renderMatchupScreen();
    showScreen('screen-matchup');
  };

  // ── Rating Modal ──
  function openRatingModal(rank) {
    const p = PLAYERS.find(pl => pl.rank === rank);
    editingRank = rank;
    editingOvr  = p.ovr;
    document.getElementById('modal-player-name').textContent = p.name;
    document.getElementById('modal-rating').textContent = editingOvr;
    document.getElementById('btn-modal-reset').style.display =
      customRatings[rank] !== undefined ? 'block' : 'none';
    document.getElementById('rating-modal').style.display = 'flex';
  }

  window.adjustRating = function(delta) {
    editingOvr = Math.max(50, Math.min(99, editingOvr + delta));
    document.getElementById('modal-rating').textContent = editingOvr;
  };

  window.saveRating = function() {
    const p = PLAYERS.find(pl => pl.rank === editingRank);
    p.ovr = editingOvr;
    customRatings[editingRank] = editingOvr;
    localStorage.setItem('2k_custom_ratings', JSON.stringify(customRatings));
    closeRatingModal();
    renderPlayers();
  };

  window.closeRatingModal = function() {
    document.getElementById('rating-modal').style.display = 'none';
    editingRank = null;
  };

  window.resetRating = function() {
    const p = PLAYERS.find(pl => pl.rank === editingRank);
    p.ovr = ORIGINAL_OVRS[editingRank];
    delete customRatings[editingRank];
    localStorage.setItem('2k_custom_ratings', JSON.stringify(customRatings));
    closeRatingModal();
    renderPlayers();
  };

  // Close modal on overlay click
  document.getElementById('rating-modal').addEventListener('click', function(e) {
    if (e.target === this) closeRatingModal();
  });

  // ── Summary ──
  window.showSummary = function() {
    const total = history.length;
    document.getElementById('summary-sub').textContent =
      `${total} picks · ${teams.length} teams`;

    // Matchup card
    let matchupHTML = '';
    if (matchupDrawn.length > 0) {
      const sideA = matchupDrawn.filter(m => m.side === 'A');
      const sideB = matchupDrawn.filter(m => m.side === 'B');
      const bye   = matchupDrawn.find(m => m.side === 'bye');

      const chipHTML = (drawn) => {
        const t = teams[drawn.tIdx];
        return `<div class="matchup-team-chip">
          <div class="chip-dot" style="background:${t.color}"></div>
          <div><div class="chip-name">${t.name}</div><div class="chip-role">${drawn.role}</div></div>
        </div>`;
      };

      matchupHTML = `<div class="matchup-card">
        <div class="matchup-card-title">🤼 Match Up</div>
        <div class="matchup-card-body">
          ${sideA.map(chipHTML).join('')}
          <div class="matchup-vs-badge">VS</div>
          ${sideB.map(chipHTML).join('')}
          ${bye ? `<div style="width:100%;margin-top:6px;font-size:0.75rem;color:var(--subtext)">Sits Out: <span style="color:${teams[bye.tIdx].color};font-weight:700">${teams[bye.tIdx].name}</span></div>` : ''}
        </div>
      </div>`;
    }
    document.getElementById('summary-matchup').innerHTML = matchupHTML;

    document.getElementById('summary-teams').innerHTML = draftOrder.map((tIdx, orderPos) => {
      const t = teams[tIdx];
      const slots = SLOTS.map(slot => {
        const rank = t.roster[slot];
        const p    = rank !== null ? PLAYERS.find(pl => pl.rank === rank) : null;
        return `<div class="sum-slot">
          <span class="sum-slot-pos">${SLOT_LBL[slot]}</span>
          ${p
            ? `<span class="sum-slot-name">${p.name}</span><span class="sum-slot-ovr">${p.ovr}</span>`
            : `<span class="sum-slot-name sum-slot-empty">—</span>`
          }
        </div>`;
      }).join('');

      const starters = ['PG','SG','SF','PF','C']
        .map(pos => t.roster[pos])
        .filter(r => r !== null)
        .map(rank => PLAYERS.find(p => p.rank === rank).ovr);
      const avg = starters.length
        ? (starters.reduce((a,b) => a+b, 0) / starters.length).toFixed(1)
        : null;

      return `<div class="sum-team" style="--tc:${t.color}">
        <div class="sum-team-head">
          <div class="tc-dot" style="background:${t.color}"></div>
          <strong>${t.name}</strong>
          ${avg ? `<span class="sum-avg">Avg ${avg}</span>` : ''}
          <span class="sum-order-badge">Picks ${SFXS[orderPos]}</span>
        </div>
        ${slots}
      </div>`;
    }).join('');

    showScreen('screen-summary');
  };

  window.redraft = function() {
    teams.forEach(t => { t.roster = emptyRoster(); });
    available   = PLAYERS.map(p => p.rank);
    currentPick = 0;
    history     = [];
    showCount   = 20;
    showScreen('screen-draft');
    renderDraft();
  };

  window.startOver = function() {
    selected = new Set();
    document.querySelectorAll('.player-toggle').forEach(b => b.classList.remove('on'));
    document.getElementById('btn-start').disabled = true;
    showScreen('screen-setup');
  };
</script>
</body>
</html>
