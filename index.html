<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2K Draft</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --card: #16161f; --card2: #1e1e2a;
      --accent: #f7a600; --accent2: #e05c1a;
      --text: #f0f0f0; --subtext: #777; --border: #2a2a38;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Setup ── */
    .setup-wrap { max-width: 460px; margin: 0 auto; padding: 48px 20px; text-align: center; }
    .app-title {
      font-size: 3.2rem; font-weight: 900; letter-spacing: -3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .app-sub { color: var(--subtext); font-size: 0.85rem; margin-bottom: 44px; }
    .sec-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
    .num-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 40px; }
    .num-btn {
      width: 68px; height: 68px; border-radius: 18px; border: 2px solid var(--border);
      background: var(--card); color: var(--subtext); font-size: 1.7rem; font-weight: 800;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .num-btn.active, .num-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(247,166,0,0.08); }
    .team-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
    .team-row { display: flex; align-items: center; gap: 10px; }
    .team-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .team-input {
      flex: 1; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 13px 14px; color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .team-input:focus { border-color: var(--accent); }
    .team-input::placeholder { color: var(--subtext); }
    .btn-primary {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-weight: 800; font-size: 1rem; border: none; border-radius: 14px;
      cursor: pointer; font-family: inherit; letter-spacing: 0.02em; transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Reveal ── */
    .reveal-wrap {
      max-width: 460px; margin: 0 auto; padding: 48px 20px;
      text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    .reveal-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .reveal-sub { color: var(--subtext); font-size: 0.85rem; margin-bottom: 40px; }
    .hat-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 36px; }
    .hat { font-size: 110px; line-height: 1; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); filter: drop-shadow(0 6px 20px rgba(0,0,0,0.6)); user-select: none; }
    .hat.shaking { animation: hatShake 0.85s ease-in-out; }
    @keyframes hatShake {
      0%,100% { transform: translateX(-50%) rotate(0deg); }
      12%  { transform: translateX(-50%) rotate(-13deg); }
      25%  { transform: translateX(-50%) rotate(13deg); }
      37%  { transform: translateX(-50%) rotate(-9deg); }
      50%  { transform: translateX(-50%) rotate(9deg); }
      62%  { transform: translateX(-50%) rotate(-6deg); }
      75%  { transform: translateX(-50%) rotate(6deg); }
      87%  { transform: translateX(-50%) rotate(-3deg); }
    }
    .slips-area { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 52px; margin-bottom: 36px; }
    .slip {
      padding: 9px 18px; border-radius: 10px; font-weight: 700; font-size: 0.9rem;
      border: 2px solid var(--border); background: var(--card); color: var(--text);
    }
    .slip.floating { animation: floatSlip 2s ease-in-out infinite; }
    @keyframes floatSlip { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .order-results { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin: 0 auto 32px; }
    .order-item {
      display: flex; align-items: center; gap: 12px; background: var(--card);
      border-radius: 12px; padding: 14px 16px;
      opacity: 0; transform: translateY(24px) scale(0.9);
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .order-item.revealed { opacity: 1; transform: translateY(0) scale(1); }
    .order-num { width: 32px; height: 32px; border-radius: 50%; color: #000; font-weight: 800; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .order-name { font-weight: 700; font-size: 1rem; }
    .order-badge { margin-left: auto; font-size: 0.72rem; color: var(--subtext); }
    .btn-go { max-width: 300px; display: none; }

    /* ── Draft ── */
    .draft-wrap { max-width: 920px; margin: 0 auto; padding: 16px; }
    .draft-header {
      background: var(--card); border-radius: var(--radius); padding: 16px 20px;
      margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .turn-info { display: flex; align-items: center; gap: 12px; }
    .turn-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .turn-dot.pulse { animation: dotPulse 1.5s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }
    .turn-lbl { font-size: 0.68rem; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; }
    .turn-name { font-size: 1.1rem; font-weight: 800; }
    .pick-badge { background: var(--card2); border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; color: var(--subtext); }
    .pick-badge strong { color: var(--text); }

    .draft-body { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
    @media (max-width: 680px) { .draft-body { grid-template-columns: 1fr; } }

    .panel-lbl { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }

    .player-card {
      display: flex; align-items: center; gap: 12px; background: var(--card);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
      cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s;
    }
    .player-card:hover { border-color: var(--accent); background: var(--card2); transform: translateX(-2px); }
    .player-card:active { transform: scale(0.98); }
    .p-rank { width: 26px; font-size: 0.68rem; color: var(--subtext); font-weight: 600; text-align: center; flex-shrink: 0; }
    .p-info { flex: 1; min-width: 0; }
    .p-name { font-size: 0.88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-team { font-size: 0.7rem; color: var(--subtext); }
    .p-ovr { font-size: 1rem; font-weight: 800; color: var(--accent); flex-shrink: 0; }

    .show-more {
      width: 100%; padding: 12px; background: var(--card);
      border: 1.5px dashed var(--border); border-radius: 10px;
      color: var(--subtext); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s; margin-top: 4px;
    }
    .show-more:hover { border-color: var(--accent); color: var(--accent); }

    .team-card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; border: 1.5px solid transparent; transition: border-color 0.2s; }
    .team-card.active-team { border-color: var(--teamcolor, var(--accent)); }
    .tc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .tc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tc-name { font-size: 0.85rem; font-weight: 700; }
    .tc-count { margin-left: auto; font-size: 0.68rem; color: var(--subtext); }
    .tc-pick { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .tc-pick:last-child { border-bottom: none; }
    .tc-pnum { width: 18px; font-size: 0.62rem; color: var(--subtext); flex-shrink: 0; }
    .tc-pname { flex: 1; font-weight: 600; }
    .tc-povr { font-size: 0.75rem; color: var(--accent); font-weight: 700; }
    .tc-empty { font-size: 0.75rem; color: var(--subtext); font-style: italic; text-align: center; padding: 6px 0; }

    .btn-end {
      width: 100%; padding: 11px; background: transparent; border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--subtext); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 4px; transition: all 0.15s;
    }
    .btn-end:hover { border-color: #ff453a; color: #ff453a; }

    .done-banner {
      background: linear-gradient(135deg, rgba(247,166,0,0.12), rgba(224,92,26,0.12));
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      padding: 24px; text-align: center; margin-bottom: 16px;
    }
    .done-banner h2 { font-size: 1.4rem; margin-bottom: 6px; }
    .done-banner p { font-size: 0.85rem; color: var(--subtext); }
    .btn-new { display: inline-block; margin-top: 14px; padding: 11px 28px; background: var(--accent); color: #000; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- Setup -->
<div class="screen active" id="screen-setup">
  <div class="setup-wrap">
    <div class="app-title">2K DRAFT</div>

    </div>

    <div class="team-inputs" id="team-inputs"></div>
    <button class="btn-primary" id="btn-start">Let's Draft 🏀</button>
  </div>
</div>

<!-- Reveal -->
<div class="screen" id="screen-reveal">

    <div class="order-results" id="order-results"></div>
    <button class="btn-primary btn-go" id="btn-go">Start Drafting →</button>
  </div>
</div>

<!-- Draft -->
<div class="screen" id="screen-draft">

    <div class="done-banner" id="done-banner" style="display:none">

    <div class="draft-header" id="draft-header">
      <div class="turn-info">
        <div class="turn-dot pulse" id="turn-dot"></div>
        <div>
          <div class="turn-lbl">Now Picking</div>

      </div>
      <div class="pick-badge">Pick <strong id="pick-num">1</strong> · Round <strong id="round-num">1</strong></div>

    <div class="draft-body">
      <div>
        <div class="panel-lbl">Available Players</div>
        <div id="players-list"></div>
        <button class="show-more" id="show-more">Show 20 More ↓</button>

      <div>

        <div id="teams-list"></div>
        <button class="btn-end" id="btn-end">End Draft</button>
      </div>
    </div>
  </div>
</div>

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startReveal() {
    showScreen('screen-reveal');
    // Shuffle order
    const order = Array.from({length: numTeams}, (_, i) => i);
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    draftOrder = order;

    // Build slips
    const slipsEl = document.getElementById('slips');
    slipsEl.innerHTML = '';
    teams.forEach((t, i) => {
      const slip = document.createElement('div');
      slip.className = 'slip floating';
      slip.id = `slip-${i}`;
      slip.textContent = t.name;
      slip.style.borderColor = t.color;
      slip.style.color = t.color;
      slip.style.animationDelay = `${i * 0.18}s`;
      slipsEl.appendChild(slip);
    });

    document.getElementById('order-results').innerHTML = '';
    document.getElementById('btn-go').style.display = 'none';

    setTimeout(runAnimation, 900);
  }

  function runAnimation() {
    const hat   = document.getElementById('hat');
    const slips = document.querySelectorAll('.slip');

    // Slips fly away into hat
    slips.forEach((slip, i) => {
      setTimeout(() => {
        slip.classList.remove('floating');
        slip.style.transition = 'all 0.32s ease-in';
        slip.style.transform  = 'scale(0.05) translateY(30px)';
        slip.style.opacity    = '0';
      }, i * 90);
    });

    // Hat shakes
    const shakeAt = slips.length * 90 + 320;
    setTimeout(() => {
      hat.classList.add('shaking');
      setTimeout(() => hat.classList.remove('shaking'), 850);
    }, shakeAt);

    // Reveal results one by one
    const revealAt   = shakeAt + 950;
    const resultsEl  = document.getElementById('order-results');
    draftOrder.forEach((tIdx, i) => {
      const t    = teams[tIdx];
      const item = document.createElement('div');
      item.className = 'order-item';
      item.innerHTML = `
        <div class="order-num" style="background:${t.color}">${i+1}</div>
        <div class="order-name">${t.name}</div>
        <div class="order-badge">Picks ${SUFFIXES[i]}</div>`;
      resultsEl.appendChild(item);
      setTimeout(() => item.classList.add('revealed'), revealAt + i * 520);
    });

    // Show go button
    setTimeout(() => {
      document.getElementById('btn-go').style.display = 'block';
    }, revealAt + draftOrder.length * 520 + 200);
  }

  document.getElementById('btn-go').addEventListener('click', () => {
    showScreen('screen-draft');
    renderDraft();
  });

  // ── Draft ──
  function teamForPick(pickIdx) {
    const round    = Math.floor(pickIdx / numTeams);
    const pos      = pickIdx % numTeams;
    const orderIdx = round % 2 === 0 ? pos : numTeams - 1 - pos;
    return draftOrder[orderIdx];
  }

  function renderDraft() {
    renderHeader();
    renderPlayers();
    renderTeams();
  }

  function renderHeader() {
    const header = document.getElementById('draft-header');
    if (done) {
      header.style.display = 'none';
      document.getElementById('done-banner').style.display = 'block';
      return;
    }
    const t = teams[teamForPick(currentPick)];
    document.getElementById('turn-dot').style.background = t.color;
    document.getElementById('turn-name').textContent     = t.name;
    document.getElementById('pick-num').textContent      = currentPick + 1;
    document.getElementById('round-num').textContent     = Math.floor(currentPick / numTeams) + 1;
  }

  function renderPlayers() {
    const avail   = PLAYERS.filter(p => available.includes(p.rank));
    const visible = avail.slice(0, showCount);
    document.getElementById('players-list').innerHTML = visible.map(p => `
      <div class="player-card" onclick="pick(${p.rank})">
        <div class="p-rank">#${p.rank}</div>
        <div class="p-info">
          <div class="p-name">${p.name}</div>
          <div class="p-team">${p.team}</div>
        </div>
        <div class="p-ovr">${p.ovr}</div>
      </div>`).join('');

    const btn = document.getElementById('show-more');
    const remaining = avail.length - showCount;
    if (remaining > 0) {
      btn.style.display = 'block';
      btn.textContent   = `Show ${Math.min(20, remaining)} More ↓`;
    } else {
      btn.style.display = 'none';
    }
  }

  function renderTeams() {
    document.getElementById('teams-list').innerHTML = teams.map((t, tIdx) => {
      const isActive = !done && teamForPick(currentPick) === tIdx;
      const picks = t.picks.length
        ? t.picks.map((rank, i) => {
            const p = PLAYERS.find(pl => pl.rank === rank);
            return `<div class="tc-pick">
              <span class="tc-pnum">${i+1}.</span>
              <span class="tc-pname">${p.name}</span>
              <span class="tc-povr">${p.ovr}</span>
            </div>`;
          }).join('')
        : '<div class="tc-empty">No picks yet</div>';
      return `<div class="team-card ${isActive ? 'active-team' : ''}" style="--teamcolor:${t.color}">
        <div class="tc-head">
          <div class="tc-dot" style="background:${t.color}"></div>
          <div class="tc-name">${t.name}</div>
          <div class="tc-count">${t.picks.length} picks</div>
        </div>
        ${picks}
      </div>`;
    }).join('');
  }

  window.pick = function(rank) {
    if (done) return;
    const tIdx = teamForPick(currentPick);
    teams[tIdx].picks.push(rank);
    available = available.filter(r => r !== rank);
    currentPick++;
    if (!available.length) done = true;
    renderDraft();
  };

  document.getElementById('show-more').addEventListener('click', () => {
    showCount += 20;
    renderPlayers();
  });

  document.getElementById('btn-end').addEventListener('click', () => {
    done = true;
    document.getElementById('draft-header').style.display = 'none';
    document.getElementById('done-banner').style.display  = 'block';
    document.getElementById('show-more').style.display    = 'none';
    document.querySelector('.draft-body > div:first-child').style.display = 'none';
    renderTeams();
  });

  window.resetApp = function() {
    teams = []; draftOrder = []; currentPick = 0;
    available = PLAYERS.map(p => p.rank);
    showCount = 20; done = false;
    document.getElementById('draft-header').style.display = '';
    document.getElementById('done-banner').style.display  = 'none';
    document.getElementById('show-more').style.display    = '';
    document.querySelector('.draft-body > div:first-child').style.display = '';
    buildInputs();
    showScreen('screen-setup');
  };
</script>
</body>
</html>
