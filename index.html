<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2K Draft</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d0d14; --card: #16161f; --card2: #1e1e2a;
      --accent: #f7a600; --accent2: #e05c1a;
      --text: #f0f0f0; --subtext: #666; --border: #252530;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ─── Setup ─── */
    .setup-wrap { max-width: 440px; margin: 0 auto; padding: 48px 20px; text-align: center; }
    .app-title {
      font-size: 3.2rem; font-weight: 900; letter-spacing: -3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .app-sub { color: var(--subtext); font-size: 0.85rem; margin-bottom: 44px; }
    .sec-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .players-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 36px; }
    .player-toggle {
      padding: 14px 8px; background: var(--card); border: 2px solid var(--border);
      border-radius: 14px; color: var(--subtext); font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s; font-family: inherit; touch-action: manipulation;
    }
    .player-toggle.on { border-color: var(--accent); color: var(--accent); background: rgba(247,166,0,0.1); }
    .btn-primary {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-weight: 800; font-size: 1rem; border: none; border-radius: 14px;
      cursor: pointer; font-family: inherit; transition: opacity 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary:not(:disabled):active { transform: scale(0.98); }

    /* ─── Reveal ─── */
    .reveal-wrap { max-width: 440px; margin: 0 auto; padding: 40px 20px; text-align: center; }
    .reveal-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .reveal-sub { color: var(--subtext); font-size: 0.85rem; margin-bottom: 36px; min-height: 20px; }
    .hat-btn {
      background: none; border: none; cursor: pointer; font-size: 100px; line-height: 1;
      display: block; margin: 0 auto 32px;
      transform: scaleY(-1);
      filter: drop-shadow(0 6px 24px rgba(247,166,0,0.25));
      transition: transform 0.1s;
      touch-action: manipulation; user-select: none;
    }
    .hat-btn:active { transform: scaleY(-1) scale(0.94); }
    .hat-btn.shake { animation: hatShake 0.55s ease-in-out; }
    @keyframes hatShake {
      0%,100% { transform: scaleY(-1) rotate(0deg); }
      15%  { transform: scaleY(-1) rotate(-11deg); }
      35%  { transform: scaleY(-1) rotate(11deg); }
      55%  { transform: scaleY(-1) rotate(-7deg); }
      75%  { transform: scaleY(-1) rotate(7deg); }
      90%  { transform: scaleY(-1) rotate(-3deg); }
    }
    .order-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin: 0 auto 28px; }
    .order-item {
      display: flex; align-items: center; gap: 12px; background: var(--card);
      border-radius: 12px; padding: 13px 16px;
      opacity: 0; transform: translateY(20px) scale(0.88);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .order-item.show { opacity: 1; transform: none; }
    .order-num { width: 30px; height: 30px; border-radius: 50%; color: #000; font-weight: 800; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .order-name { font-weight: 700; font-size: 1rem; }
    .order-badge { margin-left: auto; font-size: 0.7rem; color: var(--subtext); }
    .btn-go { display: none; max-width: 300px; margin: 0 auto; }
    .tap-hint { color: var(--subtext); font-size: 0.78rem; margin-bottom: 0; }

    /* ─── Draft ─── */
    .draft-wrap { max-width: 960px; margin: 0 auto; padding: 14px; }

    /* Teams top bar */
    .teams-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
    .teams-bar::-webkit-scrollbar { display: none; }
    .team-tile {
      flex-shrink: 0; min-width: 120px; background: var(--card); border-radius: var(--radius);
      padding: 10px 12px; border: 2px solid transparent; transition: border-color 0.2s, background 0.2s;
    }
    .team-tile.cur { border-color: var(--tc); background: color-mix(in srgb, var(--tc) 10%, var(--card)); }
    .tt-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .tt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tt-name { font-size: 0.82rem; font-weight: 700; white-space: nowrap; }
    .tt-count { font-size: 0.62rem; color: var(--subtext); margin-left: auto; }
    .tt-pick { font-size: 0.72rem; color: var(--text); padding: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tt-pick-ovr { color: var(--accent); font-weight: 700; }
    .tt-empty { font-size: 0.7rem; color: var(--subtext); font-style: italic; }

    /* Current pick bar */
    .pick-bar {
      background: var(--card); border-radius: var(--radius); padding: 14px 18px;
      margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .pb-left { display: flex; align-items: center; gap: 10px; }
    .pb-dot { width: 11px; height: 11px; border-radius: 50%; animation: dotPulse 1.5s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.72)} }
    .pb-lbl { font-size: 0.65rem; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; }
    .pb-name { font-size: 1.05rem; font-weight: 800; }
    .pb-badge { background: var(--card2); border-radius: 8px; padding: 5px 11px; font-size: 0.72rem; color: var(--subtext); white-space: nowrap; }
    .pb-badge strong { color: var(--text); }

    /* Player list */
    .section-lbl { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    .player-card {
      display: flex; align-items: center; gap: 11px; background: var(--card);
      border-radius: 10px; padding: 10px 13px; margin-bottom: 7px;
      cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.12s, background 0.12s;
      touch-action: manipulation; user-select: none;
    }
    .player-card:hover { border-color: var(--accent); background: var(--card2); }
    .player-card:active { background: color-mix(in srgb, var(--accent) 12%, var(--card)); }
    .p-rank { width: 24px; font-size: 0.65rem; color: var(--subtext); font-weight: 600; text-align: center; flex-shrink: 0; }
    .p-info { flex: 1; min-width: 0; }
    .p-name { font-size: 0.87rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-team { font-size: 0.68rem; color: var(--subtext); }
    .p-ovr { font-size: 0.98rem; font-weight: 800; color: var(--accent); flex-shrink: 0; }
    .show-more {
      width: 100%; padding: 11px; background: var(--card); border: 1.5px dashed var(--border);
      border-radius: 10px; color: var(--subtext); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s; touch-action: manipulation;
    }
    .show-more:hover { border-color: var(--accent); color: var(--accent); }

    /* Bottom button */
    .btn-bottom {
      width: 100%; margin-top: 16px; padding: 13px;
      background: transparent; border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--subtext); font-size: 0.88rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s; touch-action: manipulation;
    }
    .btn-bottom.end:hover { border-color: #ff453a; color: #ff453a; }
    .btn-bottom.new { border-color: var(--accent); color: var(--accent); }
    .btn-bottom.new:hover { background: rgba(247,166,0,0.08); }
  </style>
</head>
<body>

<!-- Setup -->
<div class="screen active" id="screen-setup">
  <div class="setup-wrap">
    <div class="app-title">2K DRAFT</div>
    <div class="app-sub">NBA 2K26 · Snake Draft</div>
    <div class="sec-label">Who's playing?</div>
    <div class="players-grid" id="players-grid"></div>
    <button class="btn-primary" id="btn-start" disabled>Continue →</button>
  </div>
</div>

<!-- Reveal -->
<div class="screen" id="screen-reveal">
  <div class="reveal-wrap">
    <div class="reveal-title">Draft Order</div>
    <div class="reveal-sub tap-hint" id="reveal-sub">Tap the hat to draw a name</div>
    <button class="hat-btn" id="hat" onclick="drawNext()">🎩</button>
    <div class="order-list" id="order-list"></div>
    <button class="btn-primary btn-go" id="btn-go">Start Drafting →</button>
  </div>
</div>

<!-- Draft -->
<div class="screen" id="screen-draft">
  <div class="draft-wrap">
    <div class="teams-bar" id="teams-bar"></div>
    <div class="pick-bar" id="pick-bar">
      <div class="pb-left">
        <div class="pb-dot" id="pb-dot"></div>
        <div>
          <div class="pb-lbl">Now Picking</div>
          <div class="pb-name" id="pb-name"></div>
        </div>
      </div>
      <div class="pb-badge">Pick <strong id="pb-pick">1</strong> · Round <strong id="pb-round">1</strong></div>
    </div>
    <div class="section-lbl">Available Players</div>
    <div id="players-list"></div>
    <button class="show-more" id="show-more">Show 20 More ↓</button>
    <button class="btn-bottom end" id="btn-bottom" onclick="endOrReset()">End Draft</button>
  </div>
</div>

  // ── State ──
  let selected    = new Set();  // NAMES indices
  let teams       = [];         // [{name, color, picks:[rank,...]}]
  let draftOrder  = [];         // team indices
  let drawIndex   = 0;          // how many have been drawn from hat
  let shuffled    = [];         // shuffled team indices for reveal
  let currentPick = 0;
  let available   = [];
  let showCount   = 20;
  let draftDone   = false;

  // ── Setup ──
  const grid = document.getElementById('players-grid');
  NAMES.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'player-toggle';
    btn.textContent = name;
    btn.dataset.i = i;
    btn.addEventListener('click', () => {
      if (selected.has(i)) selected.delete(i);
      else selected.add(i);
      btn.classList.toggle('on', selected.has(i));
      document.getElementById('btn-start').disabled = selected.size < 2;
    });
    grid.appendChild(btn);
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    const sel = [...selected].sort((a,b) => a - b);
    teams = sel.map(i => ({ name: NAMES[i], color: COLORS[i], picks: [] }));
    available = PLAYERS.map(p => p.rank);
    currentPick = 0; draftDone = false; showCount = 20;

    // Shuffle for reveal
    shuffled = Array.from({length: teams.length}, (_, i) => i);
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    draftOrder = shuffled;
    drawIndex  = 0;

    document.getElementById('order-list').innerHTML = '';
    document.getElementById('btn-go').style.display = 'none';
    document.getElementById('reveal-sub').textContent = 'Tap the hat to draw a name';
    showScreen('screen-reveal');
  });

  // ── Reveal ──
  let hatBusy = false;
  window.drawNext = function() {
    if (hatBusy || drawIndex >= teams.length) return;
    hatBusy = true;

    const hat = document.getElementById('hat');
    hat.classList.add('shake');
    setTimeout(() => hat.classList.remove('shake'), 560);

    setTimeout(() => {
      const tIdx = shuffled[drawIndex];
      const t    = teams[tIdx];
      const item = document.createElement('div');
      item.className = 'order-item';
      item.innerHTML = `
        <div class="order-num" style="background:${t.color}">${drawIndex + 1}</div>
        <div class="order-name">${t.name}</div>
        <div class="order-badge">Picks ${SFXS[drawIndex]}</div>`;
      document.getElementById('order-list').appendChild(item);
      requestAnimationFrame(() => requestAnimationFrame(() => item.classList.add('show')));

      drawIndex++;
      hatBusy = false;

      if (drawIndex >= teams.length) {
        document.getElementById('reveal-sub').textContent = 'Draft order set!';
        document.getElementById('btn-go').style.display  = 'block';
      } else {
        const left = teams.length - drawIndex;
        document.getElementById('reveal-sub').textContent = `${left} name${left > 1 ? 's' : ''} left`;
      }
    }, 300);
  };

  document.getElementById('btn-go').addEventListener('click', () => {
    showScreen('screen-draft');
    renderDraft();
  });

  // ── Draft ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function teamForPick(pickIdx) {
    const n    = teams.length;
    const round = Math.floor(pickIdx / n);
    const pos   = pickIdx % n;
    return draftOrder[round % 2 === 0 ? pos : n - 1 - pos];
  }

  function renderDraft() {
    renderTeamsBar();
    renderPickBar();
    renderPlayers();
    // Update bottom button
    const btn = document.getElementById('btn-bottom');
    if (draftDone) {
      btn.textContent = 'New Draft';
      btn.className   = 'btn-bottom new';
    } else {
      btn.textContent = 'End Draft';
      btn.className   = 'btn-bottom end';
    }
  }

  function renderTeamsBar() {
    const curTeam = draftDone ? -1 : teamForPick(currentPick);
    document.getElementById('teams-bar').innerHTML = teams.map((t, i) => {
      const isCur = i === curTeam;
      const picks = t.picks.map(rank => {
        const p = PLAYERS.find(pl => pl.rank === rank);
        return `<div class="tt-pick">${p.name} <span class="tt-pick-ovr">${p.ovr}</span></div>`;
      }).join('') || '<div class="tt-empty">No picks</div>';
      return `<div class="team-tile ${isCur ? 'cur' : ''}" style="--tc:${t.color}">
        <div class="tt-head">
          <div class="tt-dot" style="background:${t.color}"></div>
          <div class="tt-name">${t.name}</div>
          <div class="tt-count">${t.picks.length}</div>
        </div>
        ${picks}
      </div>`;
    }).join('');
  }

  function renderPickBar() {
    const bar = document.getElementById('pick-bar');
    if (draftDone) { bar.style.display = 'none'; return; }
    bar.style.display = '';
    const t = teams[teamForPick(currentPick)];
    document.getElementById('pb-dot').style.background  = t.color;
    document.getElementById('pb-name').textContent       = t.name;
    document.getElementById('pb-pick').textContent       = currentPick + 1;
    document.getElementById('pb-round').textContent      = Math.floor(currentPick / teams.length) + 1;
  }

  function renderPlayers() {
    const avail   = PLAYERS.filter(p => available.includes(p.rank));
    const visible = avail.slice(0, showCount);
    const list    = document.getElementById('players-list');

    // Build HTML then set — avoids any lingering :focus/:active states
    list.innerHTML = visible.map(p => `
      <div class="player-card" data-rank="${p.rank}">
        <div class="p-rank">#${p.rank}</div>
        <div class="p-info">
          <div class="p-name">${p.name}</div>
          <div class="p-team">${p.team}</div>
        </div>
        <div class="p-ovr">${p.ovr}</div>
      </div>`).join('');

    // Attach listeners fresh (no lingering state)
    list.querySelectorAll('.player-card').forEach(card => {
      card.addEventListener('pointerup', () => {
        if (!draftDone) pickPlayer(+card.dataset.rank);
      });
    });

    const btn = document.getElementById('show-more');
    const rem = avail.length - showCount;
    if (rem > 0) {
      btn.style.display  = 'block';
      btn.textContent    = `Show ${Math.min(20, rem)} More ↓`;
    } else {
      btn.style.display  = 'none';
    }
    if (draftDone) btn.style.display = 'none';
  }

  function pickPlayer(rank) {
    const tIdx = teamForPick(currentPick);
    teams[tIdx].picks.push(rank);
    available = available.filter(r => r !== rank);
    currentPick++;
    if (!available.length) draftDone = true;
    renderDraft();
  }

  document.getElementById('show-more').addEventListener('click', () => {
    showCount += 20;
    renderPlayers();
  });

  window.endOrReset = function() {
    if (draftDone) {
      // Reset
      selected = new Set();
      document.querySelectorAll('.player-toggle').forEach(b => b.classList.remove('on'));
      document.getElementById('btn-start').disabled = true;
      showScreen('screen-setup');
    } else {
      draftDone = true;
      renderDraft();
    }
  };
</script>
</body>
</html>
